<!DOCTYPE html>
<html>

<head>
	<title>Transition and Animation Exercises</title>
	<meta charset="UTF-8">
	<meta name="description" content="Sample Code to implement transform and transition">
	<meta name="author" content="A.L. Mendoza & M.Tarcelo">
	<meta name="revised" content="12/04/2022">
	<meta name="viewport" content="width=device-width, initial-scale=1">
	<style>
		* {
			box-sizing: border-box;
		}

		#deck {
			width: 50vw;
			height: 50vh;
			margin: 50px auto;
			border: 3px solid black;
			position: relative;
			display: flex;
			justify-content: center;
			align-items: center;
		}

		#deck div {
			border: 3px solid black;
			height: 30vh;
			width: 20vw;
			background-color: white;
			color: red;
			font-size: 2em;
			padding: 5px;
			font-weight: bold;
			position: absolute;
			transition: 0.5s;
			transform-origin: bottom left;
		}

		#deck:hover div:nth-child(1) {
			transform: rotate(-40deg);
		}

		#deck:hover div:nth-child(2) {
			transform: rotate(-30deg);
		}

		#deck:hover div:nth-child(3) {
			transform: rotate(-20deg);
		}

		#deck:hover div:nth-child(4) {
			transform: rotate(0deg);
		}
		#deck:hover div:nth-child(5) {
			transform: rotate(10deg);
		}

		#deck div:hover {
			border-color: yellow;
		}

		#deck div:nth-child(1):hover {
			background-color: yellow;
		}

		#deck div:nth-child(2):hover {
			background-color: orange;
		}

		#deck div:nth-child(3):hover {
			background-color: green;
		}

		#deck div:nth-child(4):hover {
			background-color: blue;
		}

		#deck div:nth-child(5):hover {
			background-color: violet;
		}

		button {
			display: block;
			width: 25vw;
			padding: 5px;
			margin: 10px auto;
		}
	</style>
</head>

<body>
	<div id="deck">
		<div> &#9824;</div>
		<div> &#127808;</div>
		<div> &#9670;</div>
		<div> &#10084;</div>
		<div> &#127183;</div>
	</div>
	<a href="../index.html"><button> Click me for Home</button> </a>
</body>

</html>
