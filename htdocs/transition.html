<!DOCTYPE html>
<html>
	<head>
		<title>Transition</title>
		<meta charset="utf-8">
		<meta name="description" content="Sample code to implement transition">
    <meta name="keywords" content="transition">
    <meta name="author" content="A.L. Mendoza">
    <meta name="revised" content="01/13/2020">
		<meta name="viewport" content="width=device-width, initial-scale=1">
		<style>
			* {
			    box-sizing: border-box;  
			}

			body {
			    font-family: Arial, Helvetica, sans-serif;
			}

			/*-- simple text and border effects on h1 -- */
			h1 { background: lightgray; 
				color: white;
				text-align: center; 
				padding: 10px;
				width: 50%;
				border-radius: 25px;
				margin: 0 auto;
				border: 2px solid gray;
				text-shadow: 2px 2px 5px #000000;
				box-shadow: 10px 10px 7px grey;
			}
				
			div {width: 100px;
				height: 100px;
				padding-top: 10px;
				margin: 20px auto;
				text-align:center;
				color: white;
			}
				
			.first {background-color:red}
			.second {background-color:blue}
			.third {background-color:red}

			/*-- transition on width and heigth --*/
			.first {
				transition: width 2s, height 4s;
			}

			.first:hover {
				width: 200px;
				height: 200px;
			}

			/*-- background color transition --*/
			.second {
			  -webkit-transition-duration: 2s;
			  transition-duration: 2s;
			  
			  -webkit-transition-property: background-color;
			  transition-property: background-color;
			}

			.second:hover { 
				background-color: lightblue;
				cursor: pointer
			}

			/*-- transform transition --*/
			.third {
				transition: transform 1s;
			}

			.third:hover { 
				-webkit-transform: rotate(360deg); /* Safari */
				transform: rotate(360deg)
			}

      /*-- flex-grow transition --*/
      p { text-align: center;}
      #container {
        width: 70%;
        margin: 0 auto;
        text-align: center; 
        display: flex;
      }
      
      #container div {
        height: 5cm;
        background-color: lightcyan;
        color: black;
        border: 1px solid black;
        margin: 0px 0px 5px; 
        padding-top: 5px;
      }
      
      #container > div {
        flex-grow: 1;
        transition: flex-grow 1s;
        transition-timing-function: ease-int-out;
      }
      
      #container div:hover{
        background: cornsilk;
        flex-grow: 2;
      }

      /*-- for the return to home button */
      a {
        text-decoration: none;
      }
      button {
        display: block;
        width: 25vw;
        padding: 5px;
        margin: 10px auto;
      }
		</style>
		</style>
	</head>
	<body>
		<h1> transition property  </h1>
		<div class="first"> width and height </div>
		<div class="second"> background </br> color </div>
		<div class="third"> transform<br/> &#11164;&#11166; </div>
    <p>
      <a href="../index.html">
        <button> Click me for Home</button> 
      </a>
    </p>
    <p> Transition on Flex Grow</p>
    <div id="container">
     <div>
       <h2> 1 </h2>
       <p> いち <br/>(ichi) </p>
     </div>
     <div>
       <h2> 2 </h2>
        <p> に <br/> (ni) </p>
     </div>
     <div>
       <h2> 3 </h2>
       <p> さん <br/> (san) </p>
     </div>
     <div>
       <h2> 4 </h2>
       <p> し <br/>(shi) </p>
     </div>
    </div>
	</body>
</html>
