<!DOCTYPE html>
<html>

<head>
	<title>Transition and Animation Exercises</title>
	<meta charset="UTF-8">
	<meta name="description" content="Sample Code to implement transform and transition">
	<meta name="author" content="A.L. Mendoza & M.Tarcelo">
	<meta name="revised" content="12/04/2022">
	<meta name="viewport" content="width=device-width, initial-scale=1">
	<style>
		* {
			box-sizing: border-box;
		}

		#roll {
			width: 400px;
			height: 400px;
			margin: 30px auto;
			position: relative;
			background-color: #fff;
		}

		#roll p {
			position: absolute;
			top: 0;
			left: 0;
			width: 400px;
			height: 400px;
			margin: 0;
			z-index: 1;
		}

		#roll img {
			width: 100%;
			height: 100%;
			object-fit: cover;
			display: block;
		}

		#roll div {
			width: 200px;
			height: 200px;
			position: absolute;
			z-index: 2;
			transition: all 0.5s ease-in-out;
		}

		#roll div:first-of-type {
			background-color: red;
			top: 0;
			left: 0;
		}

		#roll div:nth-of-type(2) {
			background-color: yellow;
			top: 0;
			left: 200px;
		}

		#roll div:nth-of-type(3) {
			background-color: blue;
			top: 200px;
			left: 0;
		}

		#roll div:last-of-type {
			background-color: green;
			top: 200px;
			left: 200px;
		}

		#roll:hover div:first-of-type {
			transform: skewX(-45deg) translateX(-100px);
		}

		#roll:hover div:nth-of-type(2) {
			transform: skewX(45deg) translateX(100px);
		}

		#roll:hover div:nth-of-type(3) {
			transform: skewX(45deg) translateX(-100px);
		}

		#roll:hover div:last-of-type {
			transform: skewX(-45deg) translateX(100px);
		}

		p {
			text-align: center;
		}
	</style>
</head>

<body>
	<div id="roll">
		<p><a href="../index.html">
				<img src="../images/funny.jpg" />
			</a>
		</p>
		<div></div>
		<div></div>
		<div></div>
		<div></div>
	</div>
	<p>Click on the Image for Home<br />
		Source: https://www.ba-bamail.com/cute-overload/75-of-the-cutest-kittens-in-the-world/
	</p>

</body>

</html>
